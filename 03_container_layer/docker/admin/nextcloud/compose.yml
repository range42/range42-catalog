services:

  db:
    image: postgres:16-alpine
    container_name: nextcloud-db
    environment:
      POSTGRES_USER:     ${POSTGRES_USER:-nextcloud}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-nextcloud}
      POSTGRES_DB:       ${POSTGRES_DB:-nextcloud}
    volumes:
      - nextcloud-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-nextcloud}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: nextcloud-redis
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  nextcloud: &main
    image: nextcloud:latest
    container_name: nextcloud
    environment:
      NEXTCLOUD_ADMIN_USER:     ${NC_ADMIN_USER:-nc-admin}
      NEXTCLOUD_ADMIN_PASSWORD: ${NC_ADMIN_PASS:-Admin1234!}
      NEXTCLOUD_TRUSTED_DOMAINS: ${NC_DOMAIN:-localhost}
      POSTGRES_HOST:     db
      POSTGRES_DB:       ${POSTGRES_DB:-nextcloud}
      POSTGRES_USER:     ${POSTGRES_USER:-nextcloud}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-nextcloud}
      REDIS_HOST:        redis
      REDIS_HOST_PORT:   "6379"
    volumes:
      - nextcloud-data:/var/www/html
    ports:
      - "${HTTP_PORT:-8080}:80"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost/status.php | grep -q '\"installed\":true'"]
      interval: 20s
      timeout: 10s
      retries: 15
      start_period: 60s
    restart: unless-stopped
#
# #### #### do not remove.
#
#   debug:
#     <<: *main
#     container_name: nextcloud-debug
#     command: ["sleep", "infinity"]

  provisioner:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nextcloud-provisioner
    environment:
      NC_URL:        http://nextcloud
      NC_ADMIN_USER: ${NC_ADMIN_USER:-nc-admin}
      NC_ADMIN_PASS: ${NC_ADMIN_PASS:-Admin1234!}
      USERS_FILE:    /provisioning/users.yml
    volumes:
      - nextcloud-tokens:/tokens
    depends_on:
      nextcloud:
        condition: service_healthy
    restart: "no"

volumes:
  nextcloud-db-data:
  nextcloud-data:
  nextcloud-tokens:
