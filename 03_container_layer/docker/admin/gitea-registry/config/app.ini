#
# ISSUE 142
#
# Reference minimal app.ini for Gitea Docker registry.
# NOT mounted by compose.yml — settings are applied via GITEA__ env vars.
# Mount at /data/gitea/conf/app.ini only if you need to override env-var defaults.
#

[server]
DOMAIN           = localhost
ROOT_URL         = http://localhost:3000
HTTP_PORT        = 3000
SSH_DOMAIN       = localhost
START_SSH_SERVER = true
SSH_PORT         = 22

[database]
DB_TYPE = postgres

[packages]
ENABLED = true

[service]
DISABLE_REGISTRATION = true

[security]
INSTALL_LOCK = true
