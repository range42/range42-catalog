# Declarative user provisioning for the Mattermost instance.
# Processed by provisioning/init.sh on first container start.
#
# !! CHANGE ALL PASSWORDS BEFORE DEPLOYING !!
# Passwords here are committed in plaintext. Use strong, unique values in production.
#
# To scale: add/remove entries under admins: or users:
# The provisioner is idempotent — re-running skips already-created accounts.

admins:
  - username: mm-admin
    email: admin@range42.local
    password: "Admin1234!"

users:
