services:
  apt-cacher-ng:
    image: sameersbn/apt-cacher-ng:latest
    container_name: apt-mirror-acng
    ports:
      - "${ACNG_PORT:-3142}:3142"
    volumes:
      - cache_data:/var/cache/apt-cacher-ng
      - ./apt-cacher-ng.conf:/etc/apt-cacher-ng/acng.conf:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "-O-", "http://localhost:3142/acng-report.html"]
      interval: 30s
      timeout: 10s
      retries: 3

  nginx:
    image: nginx:alpine
    container_name: apt-mirror-nginx
    ports:
      - "${NGINX_PORT:-80}:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      apt-cacher-ng:
        condition: service_healthy
    restart: unless-stopped

volumes:
  cache_data:
    name: ${CACHE_VOLUME_NAME:-apt-mirror-cache}
