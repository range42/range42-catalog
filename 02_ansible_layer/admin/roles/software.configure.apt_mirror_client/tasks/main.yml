---
# We use direct URL rewriting to point apt at apt-cacher-ng native URLs.
# Acquire::http::Proxy is NOT used because it causes apt-cacher-ng to receive
# proxy-mode requests for itself (confusing proxy mode, 403 error).

- name: APT MIRROR CLIENT - ensure proxy conf is absent
  ansible.builtin.file:
    path: /etc/apt/apt.conf.d/00range42-proxy
    state: absent

# Debian Trixie uses mirror+file:// with HTTPS URLs which bypass http proxy.
# Rewrite mirror list files to use apt-cacher-ng native HTTP URL format.
- name: APT MIRROR CLIENT - DEBIAN - check mirror list files exist
  ansible.builtin.stat:
    path: "{{ item }}"
  register: _debian_mirror_lists
  loop:
    - /etc/apt/mirrors/debian.list
    - /etc/apt/mirrors/debian-security.list
  when:
    - apt_mirror_enabled | default(false) | bool
    - apt_proxy_url | default('') | length > 0
    - ansible_facts.distribution == 'Debian'

- name: APT MIRROR CLIENT - DEBIAN - rewrite debian.list to use apt-cacher-ng
  ansible.builtin.copy:
    dest: /etc/apt/mirrors/debian.list
    content: |
      {{ apt_proxy_url }}/deb.debian.org/debian
    owner: root
    group: root
    mode: "0644"
  when:
    - apt_mirror_enabled | default(false) | bool
    - apt_proxy_url | default('') | length > 0
    - ansible_facts.distribution == 'Debian'
    - _debian_mirror_lists.results[0].stat.exists
  notify: apt update

- name: APT MIRROR CLIENT - DEBIAN - rewrite debian-security.list to use apt-cacher-ng
  ansible.builtin.copy:
    dest: /etc/apt/mirrors/debian-security.list
    content: |
      {{ apt_proxy_url }}/security.debian.org
    owner: root
    group: root
    mode: "0644"
  when:
    - apt_mirror_enabled | default(false) | bool
    - apt_proxy_url | default('') | length > 0
    - ansible_facts.distribution == 'Debian'
    - _debian_mirror_lists.results[1].stat.exists
  notify: apt update

# Ubuntu Noble cloud images use plain http:// URIs in ubuntu.sources.
# Rewrite them directly to apt-cacher-ng native URLs.
- name: APT MIRROR CLIENT - UBUNTU - check ubuntu.sources exists
  ansible.builtin.stat:
    path: /etc/apt/sources.list.d/ubuntu.sources
  register: _ubuntu_sources
  when:
    - apt_mirror_enabled | default(false) | bool
    - apt_proxy_url | default('') | length > 0
    - ansible_facts.distribution == 'Ubuntu'

- name: APT MIRROR CLIENT - UBUNTU - rewrite archive URI to use apt-cacher-ng
  ansible.builtin.replace:
    path: /etc/apt/sources.list.d/ubuntu.sources
    regexp: 'http://archive\.ubuntu\.com/ubuntu'
    replace: "{{ apt_proxy_url }}/archive.ubuntu.com/ubuntu"
  when:
    - apt_mirror_enabled | default(false) | bool
    - apt_proxy_url | default('') | length > 0
    - ansible_facts.distribution == 'Ubuntu'
    - _ubuntu_sources.stat.exists
  notify: apt update

- name: APT MIRROR CLIENT - UBUNTU - rewrite security URI to use apt-cacher-ng
  ansible.builtin.replace:
    path: /etc/apt/sources.list.d/ubuntu.sources
    regexp: 'http://security\.ubuntu\.com/ubuntu'
    replace: "{{ apt_proxy_url }}/security.ubuntu.com/ubuntu"
  when:
    - apt_mirror_enabled | default(false) | bool
    - apt_proxy_url | default('') | length > 0
    - ansible_facts.distribution == 'Ubuntu'
    - _ubuntu_sources.stat.exists
  notify: apt update
