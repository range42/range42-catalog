---
- name: Ensure deploy directory exists
  ansible.builtin.file:
    path: "{{ apt_mirror_deploy_dir }}"
    state: directory
    mode: "0755"

- name: Template aptly docker-compose
  ansible.builtin.template:
    src: aptly-compose.yml.j2
    dest: "{{ apt_mirror_deploy_dir }}/docker-compose.yml"
    mode: "0644"
  notify: Restart apt-mirror stack

- name: Template aptly config
  ansible.builtin.template:
    src: aptly.conf.j2
    dest: "{{ apt_mirror_deploy_dir }}/aptly.conf"
    mode: "0644"
  notify: Restart apt-mirror stack

- name: Copy nginx config
  ansible.builtin.copy:
    src: "{{ role_path }}/../../../../../03_container_layer/docker/apt-mirror/nginx.conf"
    dest: "{{ apt_mirror_deploy_dir }}/nginx.conf"
    mode: "0644"

- name: Start aptly stack
  community.docker.docker_compose_v2:
    project_src: "{{ apt_mirror_deploy_dir }}"
    state: present

- name: Open firewall port for aptly
  community.general.ufw:
    rule: allow
    port: "{{ apt_mirror_port }}"
    proto: tcp
    comment: "apt-mirror aptly"
  when: ansible_facts['distribution'] in ['Ubuntu', 'Debian']
  ignore_errors: true

- name: Build aptly mirror list from scope vars
  ansible.builtin.set_fact:
    _aptly_mirrors: >-
      {{
        (['debian-stable'] if apt_mirror_debian_stable else []) +
        (['ubuntu-jammy'] if apt_mirror_ubuntu_2204 else []) +
        (['ubuntu-noble'] if apt_mirror_ubuntu_2404 else [])
      }}

- name: Init aptly mirrors
  ansible.builtin.command:
    cmd: >
      docker exec apt-mirror-aptly aptly mirror create
      -architectures={{ apt_mirror_aptly_architectures | join(',') }}
      {{ item }} http://deb.debian.org/debian stable main
  loop: "{{ _aptly_mirrors | select('match', 'debian-.*') | list }}"
  ignore_errors: true

- name: Update aptly mirrors
  ansible.builtin.command:
    cmd: docker exec apt-mirror-aptly aptly mirror update {{ item }}
  loop: "{{ _aptly_mirrors }}"
  async: 3600
  poll: 30
